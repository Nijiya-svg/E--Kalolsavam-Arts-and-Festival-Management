<!DOCTYPE html>
<html>
<head>
    <title>Registered Participants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">Registered Participants</h2>

    <table class="table table-bordered table-striped shadow">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>School</th>
                <th>Course</th>
                <th>Event</th>
                <th>Category</th>
                <th>Stage</th>
            </tr>
        </thead>

        <tbody>
            {% for p in data %}
            <tr>
                <td>{{ p.student.name }}</td>
                <td>{{ p.student.school }}</td>
                <td>{{ p.student.course }}</td>
                <td>{{ p.event.name }}</td>
                <td>{{ p.event.category }}</td>
                <td>{{ p.event.stage }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6" class="text-center">No registrations yet</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/" class="btn btn-primary">Back to Home</a>

</div>

</body>
</html>
