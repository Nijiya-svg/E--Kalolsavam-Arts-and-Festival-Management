{% extends 'student/base.html' %}
{% block content %}

<div class="card card-box p-4">
    <h3 class="mb-4">My Participations</h3>

    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>Event</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            {% for r in records %}
            <tr>
                <td>{{ r.event.name }}</td>
                <td><span class="badge bg-success">{{ r.status }}</span></td>
            </tr>
            {% empty %}
            <tr><td colspan="2" class="text-center">No registrations yet</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'home' %}" class="btn btn-secondary">Back</a>
</div>

{% endblock %}
